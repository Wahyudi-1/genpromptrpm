<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Prompt Pembelajaran Mendalam SMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { background-color: #eff6ff; color: #2563eb; border-left: 4px solid #2563eb; font-weight: 600; }
        .tab-inactive { color: #475569; border-left: 4px solid transparent; }
        .tab-inactive:hover { background-color: #f1f5f9; color: #0f172a; }
        /* Toast notification styles */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #10b981;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">G</div>
                <h1 class="text-lg font-bold text-slate-800">Generator Prompt RPM</h1>
            </div>
            <div class="text-sm text-slate-500 hidden sm:block">
                Optimasi Gemini AI untuk Penyusunan Perencanaan Pembelajaran
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-6">
        
        <aside class="w-full md:w-1/3 lg:w-1/4 flex flex-col gap-2 bg-white p-4 rounded-xl shadow-sm border border-slate-100 h-fit">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-3">Menu Generator</h2>
            <button onclick="switchTab(1)" id="tab-1" class="tab-btn tab-active text-left px-4 py-3 rounded-r-lg transition-colors text-sm">
                1. Perumusan Tujuan Pembelajaran (TP)
            </button>
            <button onclick="switchTab(2)" id="tab-2" class="tab-btn tab-inactive text-left px-4 py-3 rounded-r-lg transition-colors text-sm">
                2. Penyusunan Alur TP (ATP)
            </button>
            <button onclick="switchTab(3)" id="tab-3" class="tab-btn tab-inactive text-left px-4 py-3 rounded-r-lg transition-colors text-sm">
                3. Perencanaan Pembelajaran (Modul Ajar)
            </button>
            <button onclick="switchTab(4)" id="tab-4" class="tab-btn tab-inactive text-left px-4 py-3 rounded-r-lg transition-colors text-sm">
                4. Pembangun Lembar Kerja Siswa (LKS)
            </button>
            <button onclick="switchTab(5)" id="tab-5" class="tab-btn tab-inactive text-left px-4 py-3 rounded-r-lg transition-colors text-sm">
                5. Asesmen Formatif (Kinerja & KKTP)
            </button>
            <button onclick="switchTab(6)" id="tab-6" class="tab-btn tab-inactive text-left px-4 py-3 rounded-r-lg transition-colors text-sm">
                6. Asesmen Sumatif (Literasi & Numerasi)
            </button>
        </aside>

        <section class="w-full md:w-2/3 lg:w-3/4 flex flex-col gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 id="form-title" class="text-xl font-bold text-slate-800 mb-6">1. Perumusan Tujuan Pembelajaran (TP)</h2>
                
                <!-- Form 1: TP -->
                <div id="form-1" class="form-section block space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Mata Pelajaran</label>
                        <input type="text" id="mapel-1" placeholder="Misal: Biologi, Fisika, Sejarah..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fase / Kelas</label>
                        <input type="text" id="fase-1" placeholder="Misal: Fase E (Kelas 10) atau Fase F (Kelas 11)" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Teks Capaian Pembelajaran (CP)</label>
                        <textarea id="cp-1" rows="4" placeholder="Salin dan tempel teks CP dari regulasi terbaru di sini..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>
                </div>

                <!-- Form 2: ATP -->
                <div id="form-2" class="form-section hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Mata Pelajaran & Kelas</label>
                        <input type="text" id="mapel-2" placeholder="Misal: Matematika Fase F" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Daftar Tujuan Pembelajaran (TP)</label>
                        <textarea id="tp-2" rows="4" placeholder="Tempelkan daftar TP yang telah dirumuskan..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Alokasi Waktu Total</label>
                        <input type="text" id="waktu-2" placeholder="Misal: 1 Semester (36 JP)" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <!-- Form 3: Modul Ajar -->
                <div id="form-3" class="form-section hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tujuan Pembelajaran (TP) Target</label>
                        <textarea id="tp-3" rows="2" placeholder="Masukkan 1 atau 2 TP yang menjadi fokus modul ini..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Total Pertemuan Bab/Topik Ini</label>
                            <input type="number" id="jml-pertemuan-3" placeholder="Misal: 4" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Target Generate (Workflow 2 Tahap)</label>
                            <select id="target-gen-3" onchange="toggleModulInputs()" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                                <option value="master">Tahap 1: Peta Alur (Master Plan)</option>
                                <option value="detail">Tahap 2: Detail Modul Per Pertemuan</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Form input khusus untuk mode 'Detail' -->
                    <div id="detail-inputs-3" class="hidden space-y-4 p-4 bg-slate-50 border border-slate-200 rounded-lg">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Pertemuan Ke-</label>
                                <input type="number" id="pertemuan-ke-3" placeholder="Misal: 1" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Alokasi Waktu (Pertemuan Ini)</label>
                                <input type="text" id="waktu-3" placeholder="Misal: 2 x 45 menit" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Sub-Topik Pertemuan Ini</label>
                            <input type="text" id="subtopik-3" placeholder="Misal: Identifikasi Masalah Lingkungan" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Fokus Sintaks Model (PjBL / PBL)</label>
                            <input type="text" id="sintaks-3" placeholder="Misal: Tahap 1 Penentuan Pertanyaan Mendasar" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Konteks Isu Nyata Lokal/Global</label>
                        <input type="text" id="isu-3" placeholder="Misal: Krisis air bersih di musim kemarau, Pemilihan ketua OSIS, dll." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <!-- Form 4: LKS -->
                <div id="form-4" class="form-section hidden space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Kelas / Fase</label>
                            <input type="text" id="kelas-4" placeholder="Misal: Kelas XI SMA" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Pertemuan Ke-</label>
                            <input type="number" id="pertemuan-4" placeholder="Misal: 1" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Topik Utama</label>
                            <input type="text" id="topik-4" placeholder="Misal: Perubahan Iklim" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Sub-Topik Pertemuan Ini</label>
                            <input type="text" id="subtopik-4" placeholder="Misal: Efek Rumah Kaca" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Deskripsi Aktivitas 'Mengaplikasi'</label>
                        <textarea id="aktivitas-4" rows="3" placeholder="Salin aktivitas tahap 'Mengaplikasi' dari modul pertemuan ini..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>
                </div>

                <!-- Form 5: Asesmen Formatif (Rubrik & Kinerja) -->
                <div id="form-5" class="form-section hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tujuan Pembelajaran (TP) Utama</label>
                        <textarea id="tp-5" rows="2" placeholder="Masukkan 1 TP utuh yang menjadi fokus penilaian..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Kelas / Fase</label>
                            <input type="text" id="kelas-5" placeholder="Misal: Kelas X SMA" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Jumlah Pertemuan</label>
                            <input type="number" id="jml-pertemuan-5" placeholder="Misal: 4" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Rincian Aktivitas / Output Per Pertemuan</label>
                        <textarea id="tugas-5" rows="4" placeholder="Contoh:&#10;Pertemuan 1: Identifikasi masalah & draf proyek&#10;Pertemuan 2: Eksperimen awal&#10;Pertemuan 3: Presentasi hasil" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>
                </div>

                <!-- Form 6: Asesmen Sumatif (Literasi & Numerasi) -->
                <div id="form-6" class="form-section hidden space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Mata Pelajaran & Kelas</label>
                            <input type="text" id="mapel-6" placeholder="Misal: Geografi Kelas X SMA" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Topik / Materi Pembelajaran</label>
                            <input type="text" id="topik-6" placeholder="Misal: Litosfer dan Dampaknya" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Konteks Lokal/Wilayah</label>
                            <input type="text" id="lokal-6" placeholder="Misal: Wilayah Kabupaten Ngawi, Pesisir Jawa..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Jml. Soal per Stimulus (3 - 7)</label>
                            <input type="number" id="jml-soal-6" min="3" max="7" value="3" placeholder="Misal: 3" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Tombol Generate -->
                <div class="mt-6 flex justify-end">
                    <button onclick="generatePrompt()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg shadow-sm transition-colors flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                        </svg>
                        Buat Prompt
                    </button>
                </div>
            </div>

            <!-- Result Container -->
            <div id="result-container" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-800">Hasil Prompt</h3>
                    <button onclick="copyPrompt()" class="text-blue-600 hover:text-blue-800 hover:bg-blue-50 p-2 rounded-lg transition-colors flex items-center gap-1 text-sm font-medium border border-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        Salin Prompt
                    </button>
                </div>
                
                <div class="bg-slate-50 border border-slate-200 rounded-lg p-1">
                    <textarea id="output-prompt" readonly class="w-full h-72 p-3 bg-transparent resize-y outline-none text-slate-700 leading-relaxed font-mono text-sm"></textarea>
                </div>
                <div class="mt-3 flex items-start gap-2 p-3 bg-blue-50 text-blue-800 rounded-lg text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    <p>Setelah disalin, buka <a href="https://gemini.google.com" target="_blank" class="font-bold underline">Google Gemini</a>, tempelkan prompt ini di kolom obrolan, lalu tekan kirim.</p>
                </div>
            </div>

        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast">Prompt berhasil disalin ke papan klip!</div>

    <script>
        let currentTab = 1;
        const titles = {
            1: "1. Perumusan Tujuan Pembelajaran (TP)",
            2: "2. Penyusunan Alur TP (ATP)",
            3: "3. Perencanaan Pembelajaran (Modul Ajar)",
            4: "4. Pembangun Lembar Kerja Siswa (LKS)",
            5: "5. Asesmen Formatif (Kinerja & KKTP)",
            6: "6. Asesmen Sumatif (Literasi & Numerasi)"
        };

        function switchTab(tabId) {
            // Update Tab Styling
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('tab-inactive');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');

            // Update Title
            document.getElementById('form-title').innerText = titles[tabId];

            // Show/Hide Forms
            document.querySelectorAll('.form-section').forEach(form => {
                form.classList.add('hidden');
            });
            document.getElementById(`form-${tabId}`).classList.remove('hidden');

            // Hide result container when switching tabs
            document.getElementById('result-container').classList.add('hidden');
            
            currentTab = tabId;
        }

        // Fungsi khusus untuk Toggle Form Modul Ajar (Master/Detail)
        function toggleModulInputs() {
            const targetGen = document.getElementById('target-gen-3').value;
            const detailInputs = document.getElementById('detail-inputs-3');
            if (targetGen === 'detail') {
                detailInputs.classList.remove('hidden');
            } else {
                detailInputs.classList.add('hidden');
            }
        }

        function generatePrompt() {
            let promptText = "";

            if (currentTab === 1) {
                const mapel = document.getElementById('mapel-1').value || "[Nama Mata Pelajaran]";
                const fase = document.getElementById('fase-1').value || "[Fase/Kelas]";
                const cp = document.getElementById('cp-1').value || "[Masukkan Teks CP Anda di sini]";

                promptText = `Bertindaklah sebagai Ahli Kurikulum dan Pedagogi SMA ${fase}. Saya adalah guru mata pelajaran ${mapel}. \n\nBerikut adalah teks Capaian Pembelajaran (CP) saya:\n"${cp}"\n\nInstruksi Tugas:\n1. Lakukan analisis kompetensi (kata kerja operasional) dan konten materi esensial dari teks CP tersebut.\n2. Rumuskan minimal 4 Tujuan Pembelajaran (TP) turunan yang mendorong keterampilan berpikir tingkat tinggi (HOTS).\n3. Integrasikan Taksonomi SOLO pada tingkat Relasional atau Berpikir Abstrak yang Mendalam (atau Taksonomi Bloom level Menganalisis/Mencipta).\n4. Sajikan hasilnya dalam bentuk tabel rapi dengan kolom: Kompetensi, Lingkup Materi, dan Rumusan TP sesuai dengan Panduan Pembelajaran dan Asesmen (Revisi 2025).`;
            
            } else if (currentTab === 2) {
                const mapel = document.getElementById('mapel-2').value || "[Mata Pelajaran & Kelas]";
                const tp = document.getElementById('tp-2').value || "[Daftar TP]";
                const waktu = document.getElementById('waktu-2').value || "[Alokasi Waktu]";

                promptText = `Bertindaklah sebagai Ahli Kurikulum tingkat SMA. Berdasarkan rumusan Tujuan Pembelajaran (TP) mata pelajaran ${mapel} berikut:\n\n"${tp}"\n\nInstruksi Tugas:\n1. Susunlah TP tersebut menjadi sebuah Alur Tujuan Pembelajaran (ATP) yang logis, sistematis, dan berkesinambungan untuk total alokasi waktu ${waktu}.\n2. Gunakan pendekatan/metode pengurutan yang paling relevan (pilih antara: Pengurutan Hierarkis, Konkret ke Abstrak, atau Scaffolding).\n3. Sajikan dalam bentuk tabel ATP yang memuat: Nomor Urut, Rumusan TP, dan Perkiraan Alokasi Waktu (JP).\n4. Berikan paragraf singkat di bawah tabel yang menjelaskan rasionalisasi atau alasan pedagogis mengapa Anda memilih urutan tersebut bagi perkembangan kognitif siswa SMA.`;
            
            } else if (currentTab === 3) {
                // Logika pemisahan Master Plan dan Detail Modul
                const tp = document.getElementById('tp-3').value || "[Tujuan Pembelajaran Target]";
                const jmlPertemuan = document.getElementById('jml-pertemuan-3').value || "[Jumlah]";
                const targetGen = document.getElementById('target-gen-3').value;
                const isu = document.getElementById('isu-3').value || "[Isu Lokal/Global]";

                if (targetGen === 'master') {
                    promptText = `Gunakan Tujuan Pembelajaran berikut:\n"${tp}"\n\nSaya ingin merancang unit pembelajaran berbasis proyek untuk tingkat SMA dengan total ${jmlPertemuan} pertemuan.\n\nTugas Anda:\nBuatkan "Peta Alur Pembelajaran (Master Plan)" yang membagi TP tersebut ke dalam ${jmlPertemuan} pertemuan berkesinambungan.\n\nUntuk setiap pertemuan, tentukan:\n1. Sub-Topik / Fokus Pembahasan.\n2. Tahapan Sintaks Pembelajaran yang dominan dieksekusi.\n3. Hasil/Output Pembelajaran khusus pertemuan tersebut.\n\nKonteks Isu Nyata yang Diintegrasikan: "${isu}"\n\n(Tampilkan dalam bentuk tabel matriks yang rapi dan ringkas, lalu tanyakan apakah saya siap untuk menghasilkan Modul Ajar spesifik untuk Pertemuan 1).`;
                } else {
                    const pertemuanKe = document.getElementById('pertemuan-ke-3').value || "[X]";
                    const waktu = document.getElementById('waktu-3').value || "[Alokasi Waktu]";
                    const subtopik = document.getElementById('subtopik-3').value || "[Sub-Topik]";
                    const sintaks = document.getElementById('sintaks-3').value || "[Sintaks/Tahapan]";

                    promptText = `Gunakan Tujuan Pembelajaran berikut:\n"${tp}"\n\nBuatkan draf Modul Ajar / Perencanaan Pembelajaran Khusus untuk:\n- PERTEMUAN KE-: ${pertemuanKe} dari ${jmlPertemuan} Pertemuan\n- Alokasi Waktu: ${waktu}\n- Sub-Topik Pertemuan Ini: "${subtopik}"\n- Fokus Sintaks Pertemuan Ini: ${sintaks}\n\nInstruksi Khusus Desain (Sesuai Konsep Pembelajaran Mendalam Revisi 2025):\n1. Terapkan kerangka kerja Backward Design.\n2. KETERHUBUNGAN MODUL: Berikan 1 paragraf ringkas "Jembatan Konstruksi" di awal pendahuluan yang mengaitkan materi pertemuan ini dengan pertemuan lainnya.\n3. BAGIAN KEGIATAN INTI: WAJIB dibagi secara eksplisit menjadi 3 tahap pengalaman belajar: MEMAHAMI, MENGAPLIKASI, dan MEREFLEKSI.\n4. Integrasikan prinsip BERMAKNA dengan mengaitkan sub-topik ke isu nyata: "${isu}".\n5. Integrasikan prinsip BERKESADARAN dengan memberi ruang bagi siswa meregulasi dirinya.\n6. Tuliskan 2-3 Pertanyaan Pemantik (trigger questions) khusus sub-topik pertemuan ini di tahap pendahuluan.`;
                }

            } else if (currentTab === 4) {
                const kelas = document.getElementById('kelas-4').value || "[Kelas]";
                const pertemuan = document.getElementById('pertemuan-4').value || "[X]";
                const topik = document.getElementById('topik-4').value || "[Topik Utama]";
                const subtopik = document.getElementById('subtopik-4').value || "[Sub-Topik Pertemuan Ini]";
                const aktivitas = document.getElementById('aktivitas-4').value || "[Deskripsi Aktivitas Mengaplikasi]";

                promptText = `Bertindaklah sebagai Ahli Kurikulum dan Desainer Instruksional SMA. Rancanglah Lembar Kerja Siswa (LKS) interaktif yang spesifik digunakan untuk PERTEMUAN KE-${pertemuan}.\n\nKonteks Pembelajaran:\n- Kelas/Fase: ${kelas}\n- Topik Utama: ${topik}\n- Sub-Topik Pertemuan Ini: "${subtopik}"\n\nFokus LKS ini adalah memandu siswa mengeksekusi aktivitas pada tahap 'Mengaplikasi' berdasarkan rencana pertemuan ini, dengan deskripsi kegiatan berikut:\n"${aktivitas}"\n\nKriteria Konten LKS (Sesuai Konsep Pembelajaran Mendalam):\n1. JUDUL & TUJUAN: Berikan judul LKS yang menarik dan tuliskan tujuan pembelajaran spesifik untuk aktivitas pertemuan ini.\n2. STIMULUS/SKENARIO: Buat pengantar atau skenario kasus/masalah singkat yang mengaitkan aktivitas ini dengan dunia nyata.\n3. LANGKAH KERJA (SCAFFOLDING): Susun instruksi kerja kolaboratif langkah demi langkah yang jelas dan terstruktur untuk kelompok.\n4. PERTANYAAN ANALITIS: Sediakan 3-4 pertanyaan pemandu (probing questions) di sela-sela langkah kerja yang mendorong siswa berpikir kritis (HOTS) saat memproses data/informasi.\n5. FORMAT PENCATATAN HASIL: Buatkan draf rancangan tabel, bagan, atau ruang kerja bagi siswa untuk menyajikan data temuan atau hasil pemikiran mereka khusus pada tahap pertemuan ini.`;
            
            } else if (currentTab === 5) {
                // Logika Asesmen Formatif (Rubrik Progresif)
                const tp = document.getElementById('tp-5').value || "[Tujuan Pembelajaran Target]";
                const kelas = document.getElementById('kelas-5').value || "[Kelas]";
                const jmlPertemuan = document.getElementById('jml-pertemuan-5').value || "[Jumlah]";
                const tugas = document.getElementById('tugas-5').value || "[Rincian Tugas Per Pertemuan]";

                promptText = `Bertindaklah sebagai Ahli Evaluasi Pendidikan SMA. Buatkan Asesmen Formatif Berkelanjutan dan Kriteria Ketercapaian Tujuan Pembelajaran (KKTP) berbentuk Matriks Perkembangan untuk 1 Tujuan Pembelajaran (TP) utuh berikut:\n\nTujuan Pembelajaran (TP): "${tp}"\nKelas / Fase: ${kelas}\nJumlah Pertemuan: ${jmlPertemuan} Pertemuan\n\nRincian Target Output / Aktivitas Per Pertemuan:\n${tugas}\n\nTUGAS ANDA:\n1. PETA CAPAIAN PERTEMUAN: Buatkan tabel ringkas yang memuat "Target Bukti Ketercapaian" khusus untuk masing-masing pertemuan.\n2. RUBRIK KKTP PROGRESIF (5 SKALA): Buatkan rubrik penilaian formatif menggunakan 5 skala perkembangan (Belum Berkembang, Baru Berkembang, Cukup Berkembang, Sangat Berkembang, Mahir) yang DIBAGI SPESIFIK PER PERTEMUAN.\n\nInstruksi Khusus Desain:\n- Setiap pertemuan harus memiliki kriteria spesifik sesuai target pertemuan tersebut, bukan kriteria umum.\n- Deskriptor skala harus mengukur kombinasi pengetahuan, keterampilan, dan sikap secara terpadu.\n- Sertakan panduan singkat bagi guru mengenai "Tindakan Intervensi Formatif" jika siswa berada di skala 'Belum Berkembang'.`;
            
            } else if (currentTab === 6) {
                // Logika Asesmen Sumatif (Standar AKM / Klaster Stimulus)
                const mapel = document.getElementById('mapel-6').value || "[Mata Pelajaran & Kelas]";
                const topik = document.getElementById('topik-6').value || "[Topik/Materi]";
                const lokal = document.getElementById('lokal-6').value || "[Konteks Lokal/Wilayah]";
                
                // Ambil nilai jumlah soal dan validasi batas 3 - 7
                let jmlSoal = parseInt(document.getElementById('jml-soal-6').value);
                if (isNaN(jmlSoal) || jmlSoal < 3) jmlSoal = 3;
                if (jmlSoal > 7) jmlSoal = 7;
                
                // Total soal adalah jumlah stimulus (4) dikali jumlah soal per stimulus
                const totalSoal = jmlSoal * 4;

                promptText = `Bertindaklah sebagai Ahli Evaluasi Pendidikan SMA dan Penulis Soal Standar AKM. Buatkan instrumen asesmen sumatif untuk mata pelajaran ${mapel} pada topik materi ${topik}.\n\nInstruksi Khusus Penyusunan:\n\n1. DESAIN STIMULUS (WACANA):\nBuatkan 4 buah stimulus/wacana utama yang berbeda, dengan ketentuan:\n- 2 Stimulus Literasi Membaca: Berupa teks narasi, artikel, atau infografis deskriptif.\n- 2 Stimulus Numerasi: WAJIB memuat penyajian data (angka riil, persentase, tabel, atau grafik) yang memerlukan penalaran matematis.\n- Semua stimulus diintegrasikan dengan konteks lokal/wilayah: "${lokal}".\n\n2. DESAIN SOAL (ITEM TEST):\nDi bawah SETIAP stimulus, buatkan ${jmlSoal} butir soal turunan (total ${totalSoal} soal terklaster).\n\n3. VARIASI BENTUK SOAL & LEVEL KOGNITIF:\nPastikan dalam ke-${totalSoal} soal tersebut mencakup variasi: Pilihan Ganda (1 jawaban benar), Pilihan Ganda Kompleks (lebih dari 1 jawaban benar), Benar/Salah, dan Menjodohkan.\nDistribusikan level kognitif: L1 (Pemahaman), L2 (Aplikasi), dan L3 (Penalaran/HOTS).\n*Tuliskan tag [Bentuk Soal] dan [Level Kognitif] di samping setiap nomor soal.*\n\n4. FORMAT & OUTPUT:\nSajikan dalam teks format Markdown rapi agar mudah disalin ke Google Forms. Sertakan "KUNCI JAWABAN & PEMBAHASAN EDUKATIF" di bagian akhir.`;
            }

            // Tampilkan hasil
            const resultContainer = document.getElementById('result-container');
            const outputPrompt = document.getElementById('output-prompt');
            
            outputPrompt.value = promptText;
            resultContainer.classList.remove('hidden');
            
            // Scroll sedikit ke bawah untuk memperlihatkan hasil
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyPrompt() {
            const textarea = document.getElementById('output-prompt');
            textarea.select();
            textarea.setSelectionRange(0, 99999); // Untuk perangkat mobile
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error("Gagal menyalin teks: ", err);
                const toast = document.getElementById("toast");
                toast.innerText = "Gagal menyalin. Silakan blok teks dan salin manual.";
                toast.style.backgroundColor = "#ef4444"; 
                showToast();
                setTimeout(() => {
                    toast.style.backgroundColor = "#10b981";
                    toast.innerText = "Prompt berhasil disalin ke papan klip!";
                }, 3000);
            }
            
            // Hapus seleksi teks setelah disalin
            window.getSelection().removeAllRanges();
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, 3000);
        }
    </script>
</body>
</html>
